[General]
network = sar_fydp_ap1_rev.simulations.SarMeshQoS
sim-time-limit = 120s

# =========================================================
# Radio Medium binding
# Each radio must be bound to the correct medium by name.
# =========================================================
*.radioMedium0.typename = "Ieee80211ScalarRadioMedium"
*.radioMedium1.typename = "Ieee80211ScalarRadioMedium"

# =========================================================
# Channel 0 – Control/Sensor mesh  (2.4 GHz, ch 1 → 2412 MHz)
# =========================================================
*.radioMedium0.pathLoss.typename        = "NakagamiFading"
*.radioMedium0.sameTransmissionStartTimeCheck = "warning"
*.radioMedium0.centerFrequency          = 2.412GHz
*.radioMedium0.bandwidth                = 20MHz

# =========================================================
# Channel 1 – Video streaming  (5 GHz, ch 36 → 5.18 GHz)
# Separate band eliminates co-channel interference with ch0
# =========================================================
*.radioMedium1.pathLoss.typename        = "NakagamiFading"
*.radioMedium1.sameTransmissionStartTimeCheck = "warning"
*.radioMedium1.centerFrequency          = 5.18GHz
*.radioMedium1.bandwidth                = 20MHz

# =========================================================
# PHY – wlan[0]  (control mesh, all nodes that have it)
# =========================================================
*.lidar.wlan[0].radio.centerFrequency          = 2.412GHz
*.thermalcam.wlan[0].radio.centerFrequency     = 2.412GHz
*.gas.wlan[0].radio.centerFrequency            = 2.412GHz
*.roverController.wlan[0].radio.centerFrequency = 2.412GHz
*.base.wlan[0].radio.centerFrequency           = 2.412GHz
*.RGB_CAM.wlan[0].radio.centerFrequency        = 2.412GHz

# Bind all wlan[0] radios to radioMedium0
*.lidar.wlan[0].radio.radioMediumModule        = "radioMedium0"
*.thermalcam.wlan[0].radio.radioMediumModule   = "radioMedium0"
*.gas.wlan[0].radio.radioMediumModule          = "radioMedium0"
*.roverController.wlan[0].radio.radioMediumModule = "radioMedium0"
*.base.wlan[0].radio.radioMediumModule         = "radioMedium0"
*.RGB_CAM.wlan[0].radio.radioMediumModule      = "radioMedium0"

# =========================================================
# PHY – wlan[1]  (video channel: RGB_CAM ↔ videoBase only)
# =========================================================
*.RGB_CAM.wlan[1].radio.centerFrequency        = 5.18GHz
*.videoBase.wlan[0].radio.centerFrequency      = 5.18GHz   # videoBase has only one NIC

# Bind video radios to radioMedium1
*.RGB_CAM.wlan[1].radio.radioMediumModule      = "radioMedium1"
*.videoBase.wlan[0].radio.radioMediumModule    = "radioMedium1"

# =========================================================
# MAC / MGMT – wlan[0] (control mesh)
# =========================================================
*.**.wlan[0].typename                   = "Ieee80211Interface"
*.**.wlan[0].mgmt.typename              = "Ieee80211MgmtAdhoc"
*.**.wlan[0].mac.qosStation             = true
*.**.wlan[0].classifier.typename        = "QosClassifier"

# =========================================================
# MAC / MGMT – wlan[1] (video, RGB_CAM only)
# =========================================================
*.RGB_CAM.wlan[1].typename              = "Ieee80211Interface"
*.RGB_CAM.wlan[1].mgmt.typename         = "Ieee80211MgmtAdhoc"
*.RGB_CAM.wlan[1].mac.qosStation        = true
*.RGB_CAM.wlan[1].classifier.typename   = "QosClassifier"

# videoBase wlan[0] also needs QoS
*.videoBase.wlan[0].mac.qosStation      = true
*.videoBase.wlan[0].classifier.typename = "QosClassifier"

# =========================================================
# Transmit power & sensitivity
# =========================================================
# Control mesh defaults
*.**.wlan[0].radio.transmitter.power    = 7mW
*.**.wlan[0].radio.receiver.sensitivity = -90dBm

# Video channel – bump power slightly for 5 GHz path loss
*.RGB_CAM.wlan[1].radio.transmitter.power    = 10mW
*.RGB_CAM.wlan[1].radio.receiver.sensitivity = -88dBm
*.videoBase.wlan[0].radio.transmitter.power  = 10mW
*.videoBase.wlan[0].radio.receiver.sensitivity = -88dBm

# =========================================================
# Mobility (stationary)
# =========================================================
*.lidar.mobility.typename          = "StationaryMobility"
*.RGB_CAM.mobility.typename        = "StationaryMobility"
*.thermalcam.mobility.typename     = "StationaryMobility"
*.gas.mobility.typename            = "StationaryMobility"
*.roverController.mobility.typename = "StationaryMobility"
*.base.mobility.typename           = "StationaryMobility"
*.videoBase.mobility.typename      = "StationaryMobility"

*.lidar.mobility.initialX          = 20m
*.lidar.mobility.initialY          = 2m
*.RGB_CAM.mobility.initialX        = 20m
*.RGB_CAM.mobility.initialY        = 3m
*.thermalcam.mobility.initialX     = 20m
*.thermalcam.mobility.initialY     = 1m
*.gas.mobility.initialX            = 20m
*.gas.mobility.initialY            = 2m
*.roverController.mobility.initialX = 20m
*.roverController.mobility.initialY = 1m
*.base.mobility.initialX           = 60m
*.base.mobility.initialY           = 5m
*.videoBase.mobility.initialX      = 60m
*.videoBase.mobility.initialY      = 2m

# =========================================================
# Applications – Sensors (uplink only)
# =========================================================

## LiDAR  →  base  (control mesh)
*.lidar.numApps                    = 1
*.lidar.app[0].typename            = "UdpBasicApp"
*.lidar.app[0].localPort           = 3001
*.lidar.app[0].destAddresses       = "base"
*.lidar.app[0].destPort            = 5001
*.lidar.app[0].messageLength       = 1200B
*.lidar.app[0].sendInterval        = 0.0043s
*.lidar.app[0].startTime           = 0s

## RGB_CAM  →  videoBase  (VIDEO channel via wlan[1])
*.RGB_CAM.numApps                  = 1
*.RGB_CAM.app[0].typename          = "UdpBasicApp"
*.RGB_CAM.app[0].localPort         = 3002
*.RGB_CAM.app[0].destAddresses     = "videoBase"
*.RGB_CAM.app[0].destPort          = 5002
*.RGB_CAM.app[0].messageLength     = 7000B
*.RGB_CAM.app[0].sendInterval      = 0.05s # 1.12 Mbps
*.RGB_CAM.app[0].startTime         = 0.016s

## Thermal  →  base  (control mesh)
*.thermalcam.numApps               = 1
*.thermalcam.app[0].typename       = "UdpBasicApp"
*.thermalcam.app[0].localPort      = 3003
*.thermalcam.app[0].destAddresses  = "base"
*.thermalcam.app[0].destPort       = 5006
*.thermalcam.app[0].messageLength  = 500B
*.thermalcam.app[0].sendInterval   = 0.05s
*.thermalcam.app[0].startTime      = 0.01s

## Gas  →  base  (control mesh)
*.gas.numApps                      = 1
*.gas.app[0].typename              = "UdpBasicApp"
*.gas.app[0].localPort             = 3004
*.gas.app[0].destAddresses         = "base"
*.gas.app[0].destPort              = 5007
*.gas.app[0].messageLength         = 32B
*.gas.app[0].sendInterval          = 0.1s
*.gas.app[0].startTime             = 0.6s

# =========================================================
# RoverController  (control mesh)
# =========================================================
*.roverController.numApps          = 2

*.roverController.app[0].typename  = "UdpSink"     # Teleop from base
*.roverController.app[0].localPort = 4000

*.roverController.app[1].typename  = "UdpBasicApp" # Telemetry to base
*.roverController.app[1].localPort = 3005
*.roverController.app[1].destAddresses = "base"
*.roverController.app[1].destPort  = 5005
*.roverController.app[1].messageLength = 120B
*.roverController.app[1].sendInterval  = 0.1s
*.roverController.app[1].startTime     = 0s

# =========================================================
# Base station  (control mesh)
# =========================================================
*.base.numApps                     = 5

*.base.app[0].typename             = "UdpBasicApp"   # Teleop downlink
*.base.app[0].display-name         = "TeleopSender"
*.base.app[0].localPort            = 3000
*.base.app[0].destAddresses        = "roverController"
*.base.app[0].destPort             = 4000
*.base.app[0].messageLength        = 60B
*.base.app[0].sendInterval         = 0.02s
*.base.app[0].startTime            = 0.1s

*.base.app[1].typename             = "UdpSink"        # LiDAR
*.base.app[1].localPort            = 5001

*.base.app[2].typename             = "UdpSink"        # Thermal
*.base.app[2].localPort            = 5006

*.base.app[3].typename             = "UdpSink"        # Gas
*.base.app[3].localPort            = 5007

*.base.app[4].typename             = "UdpSink"        # RoverController telemetry
*.base.app[4].localPort            = 5005

*.roverController.app[0].display-name = "TeleopReceiver"

# =========================================================
# Video receiver  (video channel)
# =========================================================
*.videoBase.numApps                = 1
*.videoBase.app[0].typename        = "UdpSink"
*.videoBase.app[0].localPort       = 5002

# =========================================================
# QoS / EDCA – port-to-priority mapping
# =========================================================
# Control mesh (wlan[0])
*.**.wlan[0].classifier.udpPortUpMap = \
    "5007 VO 4000 VO 5006 VI 5005 VI 5001 BE"

# Video channel (wlan[1] on RGB_CAM, wlan[0] on videoBase)
# All video traffic mapped to VI (Video AC)
*.RGB_CAM.wlan[1].classifier.udpPortUpMap    = "5002 VI"
*.videoBase.wlan[0].classifier.udpPortUpMap  = "5002 VI"

# ARP
*.**.ipv4.arp.typename             = "GlobalArp"

# =========================================================
# Recording
# =========================================================
**.scalar-recording = true
**.vector-recording = true