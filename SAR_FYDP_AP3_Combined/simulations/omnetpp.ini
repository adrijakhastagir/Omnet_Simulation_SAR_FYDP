[General]
network = sar_fydp_ap3_combined.simulations.SarMeshQoS
sim-time-limit = 120s

# =========================================================
# Radio / PHY
# =========================================================

*.radioMedium.pathLoss.typename = "NakagamiFading"

*.radioMedium.sameTransmissionStartTimeCheck = "warning"

*.**.wlan[0].mgmt.typename = "Ieee80211MgmtAdhoc"
*.**.wlan[0].radio.transmitter.power = 7mW
*.**.wlan[0].radio.receiver.sensitivity = -90dBm

# Thermal sensor transmitter power
*.thermal.wlan[0].radio.transmitter.power = 7mW
*.thermal.wlan[0].radio.receiver.sensitivity = -90dBm

# Gas sensor transmitter power
*.gas.wlan[0].radio.transmitter.power = 7mW
*.gas.wlan[0].radio.receiver.sensitivity = -90dBm

*.base.wlan[0].radio.receiver.sensitivity = -90dBm

# =========================================================
# Mobility (stationary)
# =========================================================
*.lidar.mobility.typename = "StationaryMobility"
*.RGB_CAM.mobility.typename = "StationaryMobility"
*.thermal.mobility.typename = "StationaryMobility"
*.gas.mobility.typename = "StationaryMobility"
*.roverController.mobility.typename = "StationaryMobility"
*.base.mobility.typename = "StationaryMobility"

*.base.app[0].display-name = "TeleopSender"
*.roverController.app[0].display-name = "TeleopReceiver"

*.lidar.mobility.initialX = 20m
*.lidar.mobility.initialY = 2m

*.RGB_CAM.mobility.initialX = 20m
*.RGB_CAM.mobility.initialY = 3m

*.thermalcam.mobility.initialX = 20m
*.thermalcam.mobility.initialY = 1m

*.gas.mobility.initialX = 20m
*.gas.mobility.initialY = 2m

*.roverController.mobility.initialX = 20m
*.roverController.mobility.initialY = 1m

*.base.mobility.initialX = 60m
*.base.mobility.initialY = 5m

# =========================================================
# Applications - Sensors (uplink only)
# =========================================================

# LiDAR -> VLP-16 (~43.2 Mbps)

*.lidar.numApps = 1
*.lidar.app[0].typename = "UdpBasicApp"
*.lidar.app[0].localPort = 3001
*.lidar.app[0].destAddresses = "base"
*.lidar.app[0].destPort = 5001
*.lidar.app[0].messageLength = 1200B
*.lidar.app[0].sendInterval = 0.0043s   # ~2.2 Mbps
*.lidar.app[0].startTime = 0s

# Depth Camera -> processed downsampled cloud (~12 Mbps)

*.depth.numApps = 1
*.depth.app[0].typename = "UdpBasicApp"
*.depth.app[0].localPort = 3002
*.depth.app[0].destAddresses = "base"
*.depth.app[0].destPort = 5002
*.depth.app[0].messageLength = 1200B
*.depth.app[0].sendInterval = 0.0008s
*.depth.app[0].startTime = 0s

## Thermal
*.thermalcam.numApps = 1
*.thermalcam.app[0].typename = "UdpBasicApp"
*.thermalcam.app[0].localPort = 3003
*.thermalcam.app[0].destAddresses = "base"
*.thermalcam.app[0].destPort = 5006
*.thermalcam.app[0].messageLength = 500B # processed thermal updates
*.thermalcam.app[0].sendInterval = 0.05s
*.thermalcam.app[0].startTime = 0.01s
#
## Gas
*.gas.numApps = 1
*.gas.app[0].typename = "UdpBasicApp"
*.gas.app[0].localPort = 3004
*.gas.app[0].destAddresses = "base"
*.gas.app[0].destPort = 5007
*.gas.app[0].messageLength = 32B
*.gas.app[0].sendInterval = 0.1s
*.gas.app[0].startTime = 0.6s

# =========================================================
# RoverController (uplink + downlink)
# =========================================================
*.roverController.numApps = 2

# Teleop downlink from base
*.roverController.app[0].typename = "UdpSink"
*.roverController.app[0].localPort = 4000

# Optional uplink to base (telemetry)
*.roverController.app[1].typename = "UdpBasicApp"
*.roverController.app[1].localPort = 3005
*.roverController.app[1].destAddresses = "base"
*.roverController.app[1].destPort = 5005
*.roverController.app[1].messageLength = 120B
*.roverController.app[1].sendInterval = 0.1s
*.roverController.app[1].startTime = 0s

# =========================================================
# Base station
# =========================================================
*.base.numApps = 6

## Teleop downlink sender
*.base.app[0].typename = "UdpBasicApp"
*.base.app[0].localPort = 3000
*.base.app[0].destAddresses = "roverController"
*.base.app[0].destPort = 4000
*.base.app[0].messageLength = 60B
*.base.app[0].sendInterval = 0.02s
*.base.app[0].startTime = 0.1s

# Sinks for sensors uplinks
*.base.app[1].typename = "UdpSink"
*.base.app[1].localPort = 5001  # LiDAR
#
*.base.app[2].typename = "UdpSink"
*.base.app[2].localPort = 5002  # RGB

*.base.app[3].typename = "UdpSink"
*.base.app[3].localPort = 5006  # Thermal

*.base.app[4].typename = "UdpSink"
*.base.app[4].localPort = 5007  # Gas

*.base.app[5].typename = "UdpSink"
*.base.app[5].localPort = 5005  # RoverController telemetry
# -------------------------

# =========================================================
# Recording
# =========================================================

# Enable Wi-Fi QoS / EDCA
*.**.wlan[0].mac.qosStation = true
*.**.wlan[0].classifier.typename = "QosClassifier"

*.**.ipv4.arp.typename = "GlobalArp"
# Port-to-priority mapping
# BK = background, BE = best effort, VI = video, VO = voice
*.**.wlan[0].classifier.udpPortUpMap = "5007 VO 4000 VO 5006 VI 5001 BE 5002 BE 5005 VI"


**.scalar-recording = true
**.vector-recording = true